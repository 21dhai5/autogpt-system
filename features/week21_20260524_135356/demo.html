<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON 格式化器</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --soft: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --success: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a 40%, #111827);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 { margin-bottom: 8px; }
    p { color: var(--muted); }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      background: var(--soft);
      color: var(--text);
      font-size: 14px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover { transform: translateY(-1px); opacity: 0.95; }
    .primary { background: var(--primary); color: #082f49; font-weight: bold; }
    .success { background: var(--success); color: #052e16; font-weight: bold; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    textarea {
      width: 100%;
      min-height: 420px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      padding: 16px;
      font-family: Consolas, monospace;
      font-size: 14px;
      resize: vertical;
    }
    .panel-title {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #0b1220;
      border: 1px solid #1e293b;
      color: var(--muted);
    }
    .status.error {
      color: #fecaca;
      border-color: #7f1d1d;
      background: rgba(127, 29, 29, 0.18);
    }
    .status.success {
      color: #bbf7d0;
      border-color: #14532d;
      background: rgba(20, 83, 45, 0.18);
    }
    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>JSON 格式化器</h1>
    <p>一个实用的 Web 工具：支持 JSON 校验、格式化、压缩、复制和下载。</p>

    <div class="toolbar">
      <button class="primary" id="formatBtn">格式化 JSON</button>
      <button id="minifyBtn">压缩 JSON</button>
      <button id="validateBtn">校验 JSON</button>
      <button id="sampleBtn">加载示例</button>
      <button id="copyBtn">复制输出</button>
      <button class="success" id="downloadBtn">下载 JSON</button>
      <button id="clearBtn">清空</button>
    </div>

    <div class="grid">
      <div>
        <h2 class="panel-title">输入</h2>
        <textarea id="input" placeholder="在这里输入 JSON..."></textarea>
      </div>
      <div>
        <h2 class="panel-title">输出</h2>
        <textarea id="output" placeholder="格式化结果将显示在这里..." readonly></textarea>
      </div>
    </div>

    <div class="status" id="status">准备就绪。</div>
    <div class="footer">运行方式：直接打开本文件，或在本目录执行 <code>npm start</code> 后访问 http://localhost:8000</div>
  </div>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    const sample = {
      app: 'week21-json-formatter',
      version: '1.0.0',
      features: ['format', 'minify', 'validate', 'copy', 'download'],
      author: {
        role: 'full-stack developer',
        week: 21
      },
      createdAt: '2026-05-24T05:54:35Z'
    };

    function setStatus(message, type = '') {
      status.className = 'status' + (type ? ' ' + type : '');
      status.textContent = message;
    }

    function parseInput() {
      const raw = input.value.trim();
      if (!raw) {
        throw new Error('请输入 JSON 内容后再执行操作。');
      }
      return JSON.parse(raw);
    }

    document.getElementById('formatBtn').addEventListener('click', () => {
      try {
        const parsed = parseInput();
        output.value = JSON.stringify(parsed, null, 2);
        setStatus('JSON 格式化成功。', 'success');
      } catch (error) {
        setStatus('格式化失败：' + error.message, 'error');
      }
    });

    document.getElementById('minifyBtn').addEventListener('click', () => {
      try {
        const parsed = parseInput();
        output.value = JSON.stringify(parsed);
        setStatus('JSON 压缩成功。', 'success');
      } catch (error) {
        setStatus('压缩失败：' + error.message, 'error');
      }
    });

    document.getElementById('validateBtn').addEventListener('click', () => {
      try {
        parseInput();
        setStatus('JSON 校验通过。', 'success');
      } catch (error) {
        setStatus('JSON 无效：' + error.message, 'error');
      }
    });

    document.getElementById('sampleBtn').addEventListener('click', () => {
      input.value = JSON.stringify(sample, null, 2);
      output.value = '';
      setStatus('已加载示例 JSON。');
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      try {
        if (!output.value) {
          throw new Error('当前没有可复制的输出内容。');
        }
        await navigator.clipboard.writeText(output.value);
        setStatus('输出内容已复制到剪贴板。', 'success');
      } catch (error) {
        setStatus('复制失败：' + error.message, 'error');
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      try {
        const content = output.value || JSON.stringify(parseInput(), null, 2);
        const blob = new Blob([content], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'formatted.json';
        link.click();
        URL.revokeObjectURL(url);
        setStatus('JSON 文件下载已开始。', 'success');
      } catch (error) {
        setStatus('下载失败：' + error.message, 'error');
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      input.value = '';
      output.value = '';
      setStatus('已清空输入与输出。');
    });
  </script>
</body>
</html>
